<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Edit Profile</title>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- ===== Sidebar ===== -->
  <aside class="sidebar">

    <!-- Logo -->
    <div class="logo">
      <img src="/image /pd.png" alt="logo">
    </div>

    <!-- Icons -->
    <ul class="sidebar-icons">
      <li><i class="fa-solid fa-house"></i></li>
      <li><i class="fa-regular fa-bell"></i></li>
      <li><i class="fa-regular fa-calendar"></i></li>
      <li><i class="fa-solid fa-chart-line"></i></li>
      <li><i class="fa-regular fa-user"></i></li>
    </ul>

    <!-- Settings Button -->
    <div class="settings-icon">
      <i class="fa-solid fa-gear"></i>
    </div>
  </aside>

  <!-- ===== Settings Menu ===== -->
  <div class="settings-wrapper">
    <h3>settings</h3>

    <ul class="settings-menu">
      <li class="active">
        <i class="fa-regular fa-pen-to-square"></i>
        Edit profile
      </li>
      <li>
        <i class="fa-regular fa-bell"></i>
        Notification
      </li>
      <li>
        <i class="fa-solid fa-lock"></i>
        Security
      </li>
      <li>
        <i class="fa-solid fa-gear"></i>
        Appearance
      </li>
      <li>
        <i class="fa-regular fa-circle-question"></i>
        Help
      </li>
    </ul>
  </div>

  <!-- ===== Main Content ===== -->
  <main class="content">

    <!-- Profile Image -->
 <div class="header-right">
  <i class="fa-regular fa-bell"></i>
  <div class="small-avatar">
    <img src="/image /profile photo.jpg" alt="small profile">
  </div>
</div>

<div class="big-profile">
  <img src="/image /profile photo.jpg" alt="profile">
</div>

    <h1>Edit profile</h1>

    <form class="form">

      <div class="row">
        <div class="input-box">
          <label>First Name</label>
          <input type="text" value="Mehrab">
        </div>

        <div class="input-box">
          <label>Last Name</label>
          <input type="text" value="Bozorgi">
        </div>
      </div>

      <div class="input-box check">
        <label>Email</label>
        <input type="email" value="Mehrabbozorgi.business@gmail.com">
        <i class="fa-solid fa-check"></i>
      </div>

      <div class="input-box">
        <label>Address</label>
        <input type="text" value="33062 Zboncak Isle">
      </div>

      <div class="input-box">
        <label>Contact Number</label>
        <input type="text" value="58077.79">
      </div>

      <div class="row">
        <div class="input-box">
          <label>City</label>
          <select>
            <option>Mehrab</option>
          </select>
        </div>

        <div class="input-box">
          <label>State</label>
          <select>
            <option>Bozorgi</option>
          </select>
        </div>
      </div>

      <div class="input-box check">
        <label>Password</label>
        <input type="text" value="sbdfbnd65sfdvb s">
        <i class="fa-solid fa-check"></i>
      </div>

      <div class="buttons">
        <button class="cancel" type="button">Cancel</button>
        <button class="save" type="submit">Save</button>
      </div>

    </form>
  </main>

</div>

</body>
</html>
